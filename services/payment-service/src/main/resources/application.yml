spring:
  application:
    name: payment-service
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
    consumer:
      group-id: payment-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        isolation.level: read_committed
        auto.offset.reset: earliest

server:
  port: 8082

mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN}
  webhook-secret: ${MERCADOPAGO_WEBHOOK_SECRET:}
  payer-email: test@testuser.com
  encryption:
    key: ${MERCADOPAGO_ENCRYPTION_KEY:}
  oauth:
    client-id: ${MP_CLIENT_ID:}
    client-secret: ${MP_CLIENT_SECRET:}
    redirect-uri: "http://localhost:8082/api/v1/admin/mp-oauth/callback"

fraud:
  service:
    url: ${FRAUD_SERVICE_URL:http://localhost:8085}

order:
  service:
    url: ${ORDER_SERVICE_URL:http://localhost:8083}

user:
  service:
    url: ${USER_SERVICE_URL:http://localhost:8081}

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      fraudService:
        base-config: default
      mercadoPago:
        base-config: default
        wait-duration-in-open-state: 60s
      userService:
        base-config: default
      orderService:
        base-config: default

payment:
  internal-secret: ${INTERNAL_SECRET:dev-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always
