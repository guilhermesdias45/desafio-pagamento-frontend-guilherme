spring:
  application:
    name: fraud-service
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true

server:
  port: 8085

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

fraud:
  block-threshold: ${FRAUD_BLOCK_THRESHOLD:90}
  review-threshold: ${FRAUD_REVIEW_THRESHOLD:70}
  analysis-timeout-ms: ${FRAUD_ANALYSIS_TIMEOUT_MS:250}
  ip-blacklist-ttl-hours: ${FRAUD_IP_BLACKLIST_TTL_HOURS:24}
  ip-blacklist-min-score: ${FRAUD_IP_BLACKLIST_MIN_SCORE:30}
  velocity-ttl-minutes: ${FRAUD_VELOCITY_TTL_MINUTES:5}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
