<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/></head>
<body style="font-family: Arial, sans-serif;">
<h2>Bem-vindo(a) à Acabou o Mony!</h2>
<p>Olá <span th:text="${fullName}">Usuário</span>,</p>
<p>Sua conta foi criada com sucesso. Confirme seu email para começar a usar nossa plataforma.</p>
<p>
  <a th:href="${appBaseUrl} + '/confirm-email?token=' + ${confirmationToken}"

    Confirmar Email
  </a>
</p>
<p>Este link expira em 24 horas.</p>
<p>Atenciosamente,<br/>Equipe Acabou o Mony</p>
</body>
</html>
