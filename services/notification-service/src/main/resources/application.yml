spring:
  application:
    name: notification-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notification_db}
    username: ${SPRING_DATASOURCE_USERNAME:aom}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: notification_service
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: notification_service
    create-schemas: true
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:3025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SMTP_TLS:false}
      mail.smtp.starttls.required: ${SMTP_TLS_REQUIRED:false}
      mail.from: ${MAIL_FROM:noreply@acaboumony.com}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: notification-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: >
          com.acaboumony.user.event.payload.UserRegisteredEvent:com.acaboumony.notification.dto.event.UserRegisteredEvent,
          com.acaboumony.user.event.payload.UserLoginBlockedEvent:com.acaboumony.notification.dto.event.UserLoginBlockedEvent,
          com.acaboumony.user.event.payload.UserTwoFactorEnabledEvent:com.acaboumony.notification.dto.event.User2faEnabledEvent,
          com.acaboumony.payment.event.TransactionCompletedEvent:com.acaboumony.notification.dto.event.TransactionCompletedEvent,
          com.acaboumony.payment.event.TransactionFailedEvent:com.acaboumony.notification.dto.event.TransactionFailedEvent,
          com.acaboumony.payment.event.TransactionRefundedEvent:com.acaboumony.notification.dto.event.TransactionRefundedEvent,
          com.acaboumony.order.event.OrderCreatedEvent:com.acaboumony.notification.dto.event.OrderCreatedEvent,
          com.acaboumony.order.event.OrderCancelledEvent:com.acaboumony.notification.dto.event.OrderCancelledEvent,
          com.acaboumony.fraud.event.FraudDetectedEvent:com.acaboumony.notification.dto.event.FraudDetectedEvent
        isolation.level: read_committed
        auto.offset.reset: earliest

server:
  port: 8084

security:
  alert:
    email: ${SECURITY_ALERT_EMAIL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  newrelic:
    metrics:
      export:
        enabled: ${NEW_RELIC_ENABLED:false}
        api-key: ${NEW_RELIC_LICENSE_KEY:disabled}
        account-id: ${NEW_RELIC_ACCOUNT_ID:0}
        step: 30s
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${APP_ENV:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
