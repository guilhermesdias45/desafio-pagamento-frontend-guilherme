spring:
  application:
    name: user-service
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          min-idle: 2

server:
  port: 8081

jwt:
  access-token-expiration-seconds: 900
  refresh-token-expiration-seconds: 604800
  two-factor-token-expiration-seconds: 300

security:
  login:
    max-attempts: 5
    lockout-duration-minutes: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
